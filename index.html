<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
  <script>
    (function() {
      if (localStorage.getItem('tetris-theme') === 'light') {
        document.documentElement.dataset.theme = 'light';
      }
      var skin = localStorage.getItem('tetris-skin');
      if (skin) document.documentElement.dataset.skin = skin;
    })();
  </script>
</head>
<body>
  <h1 class="game-title">TETRIS</h1>
  <div class="wrapper">
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel Art</option>
          </select>
        </div>

        <div class="panel-section">
          <span class="label">THEME</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="toggle-track"></span>
            <span class="toggle-label">Light</span>
          </label>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    (function() {
      var toggle = document.getElementById('theme-toggle');
      toggle.checked = document.documentElement.dataset.theme === 'light';
      toggle.addEventListener('change', function(e) {
        if (e.target.checked) {
          document.documentElement.dataset.theme = 'light';
          localStorage.setItem('tetris-theme', 'light');
        } else {
          delete document.documentElement.dataset.theme;
          localStorage.setItem('tetris-theme', 'dark');
        }
      });
    })();
  </script>
</body>
</html>
